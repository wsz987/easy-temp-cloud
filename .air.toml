root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/easy-temp-cloud.exe ."
  bin = "tmp/easy-temp-cloud.exe"
  include_ext = ["go", "html", "css", "js", "mjs"]
  exclude_dir = ["data", "tmp", "web/vendor"]
  exclude_regex = ["_test.go"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"

[log]
  time = true

[misc]
  clean_on_exit = true

[proxy]
  enabled = true
  app_port = 8080
  proxy_port = 8081

[screen]
  clear_on_rebuild = true
  keep_scroll = true
