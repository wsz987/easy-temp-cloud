<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - easy-temp-host</title>
  <style>
    :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Microsoft YaHei", sans-serif; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: #eef2f0; color: #17221c; }
    main { width: min(100%, 360px); padding: 30px; border: 1px solid #cbd7cf; border-radius: 8px; background: #fff; box-shadow: 0 16px 36px rgba(23, 34, 28, .12); }
    h1 { margin: 0 0 24px; font-size: 22px; font-weight: 700; }
    label { display: grid; gap: 8px; font-size: 14px; font-weight: 600; }
    input { width: 100%; min-height: 42px; padding: 9px 11px; border: 1px solid #9baea2; border-radius: 5px; font: inherit; }
    input:focus { border-color: #24734c; outline: 3px solid #cce8d8; }
    button { width: 100%; min-height: 42px; margin-top: 20px; border: 0; border-radius: 5px; background: #24734c; color: #fff; cursor: pointer; font: inherit; font-weight: 700; }
    button:hover { background: #195d3b; }
  </style>
</head>
<body>
  <main>
    <h1>easy-temp-host</h1>
    <form action="/login" method="post">
      <label>访问密码 <input type="password" name="password" autocomplete="current-password" required autofocus></label>
      <button type="submit">进入</button>
    </form>
  </main>
</body>
</html>
