<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#6366f1" />
    <title>访问验证 - easy-temp-cloud</title>
    <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body class="login-body">
    <div class="login-card-wrapper">
      <header class="app-header" style="margin-bottom: 24px">
        <a href="/" class="brand-logo" style="margin-bottom: 8px">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17.5 19.5 16 21H8l-1.5-1.5M12 3v13.5m-4-4 4 4 4-4" />
            <path
              d="M20 16.5a4.5 4.5 0 0 0-1.5-8.7A7 7 0 0 0 5 10.5 4.5 4.5 0 0 0 4 19.5h16"
            />
          </svg>
          <span>easy-temp-cloud</span>
        </a>
        <h1 class="hero-title" style="font-size: 28px">
          安全访问，<span>身份验证</span>
        </h1>
        <!-- <p class="hero-subtitle">请输入访问密码后继续使用临时文件传输网盘</p> -->
      </header>

      <main>
        <section class="card" aria-labelledby="login-title">
          <div class="card-header">
            <div class="card-title">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3" y="11" width="18" height="10" rx="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <span id="login-title">密码验证</span>
            </div>
            <span class="pill">访问受限</span>
          </div>

          {{if .Error}}
          <div
            style="
              margin: 16px 24px 0;
              padding: 12px 16px;
              border-radius: var(--radius-md);
              background: var(--danger-bg);
              border: 1px solid rgba(239, 68, 68, 0.2);
              color: var(--danger);
              font-size: 13.5px;
              font-weight: 600;
            "
            role="alert"
          >
            {{.Error}}
          </div>
          {{end}}

          <form class="login-form" action="/login" method="post">
            <div class="form-group">
              <label class="form-label" for="password">访问密码</label>
              <div class="password-input-wrap">
                <input
                  id="password"
                  type="password"
                  name="password"
                  autocomplete="current-password"
                  placeholder="请输入访问密码"
                  required
                  autofocus
                />
                <button
                  id="toggle-password"
                  class="password-toggle password-toggle-btn"
                  type="button"
                  aria-label="显示密码"
                  title="显示密码"
                >
                  <svg
                    class="icon-show"
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"
                    />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <svg
                    class="icon-hide"
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    hidden
                  >
                    <path d="m3 3 18 18" />
                    <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" />
                    <path
                      d="M9.9 4.2A10.9 10.9 0 0 1 12 4c6.5 0 10 8 10 8a18.5 18.5 0 0 1-3 4.4"
                    />
                    <path
                      d="M6.6 6.6C3.7 8.5 2 12 2 12s3.5 8 10 8a9.9 9.9 0 0 0 3.4-.6"
                    />
                  </svg>
                </button>
              </div>
            </div>
            <button
              class="btn btn-primary"
              type="submit"
              style="width: 100%; min-height: 46px; font-size: 15px"
            >
              验证并继续
            </button>
          </form>
        </section>
      </main>
    </div>

    <script>
      const password = document.getElementById("password");
      const toggle = document.getElementById("toggle-password");
      const showIcon = toggle.querySelector(".icon-show");
      const hideIcon = toggle.querySelector(".icon-hide");

      toggle.addEventListener("click", () => {
        const isVisible = password.type === "password";
        password.type = isVisible ? "text" : "password";
        toggle.setAttribute("aria-label", isVisible ? "隐藏密码" : "显示密码");
        toggle.title = isVisible ? "隐藏密码" : "显示密码";
        showIcon.hidden = isVisible;
        hideIcon.hidden = !isVisible;
        password.focus();
      });
    </script>
  </body>
</html>
